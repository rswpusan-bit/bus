<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>다음 버스</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: #0f1923;
    color: #f0f4f8;
    font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    user-select: none;
  }
  .wrap { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 12px; }
  .clock { text-align: center; font-size: 13px; color: #7a8fa6; letter-spacing: 0.05em; margin-top: 8px; }

  /* 탭 */
  .tabs { display: flex; gap: 8px; }
  .tab {
    flex: 1; padding: 10px; border-radius: 12px;
    border: none; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    font-family: inherit;
  }
  .tab.active { background: #1e6fbf; color: #fff; }
  .tab.inactive { background: #1a2634; color: #7a8fa6; }

  /* 메인 카드 */
  .main-card {
    background: #1a2634;
    border-radius: 20px;
    padding: 28px 24px;
    border: 1px solid rgba(255,255,255,0.06);
    border-top: 4px solid var(--accent);
  }
  .label-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .route-badge {
    font-size: 13px; font-weight: 700; color: var(--accent);
    background: rgba(255,255,255,0.07);
    padding: 3px 10px; border-radius: 20px;
  }
  .stop-name { font-size: 12px; color: #7a8fa6; }
  .dest-name { font-size: 11px; color: #4a8fa6; margin-top: 2px; }
  .arrival-time { font-size: 58px; font-weight: 800; letter-spacing: -2px; line-height: 1; color: #f0f4f8; margin: 8px 0 4px; }
  .remain { font-size: 15px; font-weight: 600; }

  /* 다음 목록 */
  .next-list { display: flex; flex-direction: column; gap: 8px; }
  .next-item {
    background: #1a2634; border-radius: 14px; padding: 14px 18px;
    display: flex; align-items: center; gap: 12px;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .next-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .next-info { flex: 1; }
  .next-route { font-size: 12px; font-weight: 700; margin-bottom: 2px; }
  .next-stop { font-size: 11px; color: #7a8fa6; }
  .next-time-col { text-align: right; }
  .next-arr { font-size: 17px; font-weight: 700; letter-spacing: -0.5px; }
  .next-rem { font-size: 11px; color: #7a8fa6; margin-top: 1px; }

  .footer { text-align: center; font-size: 11px; color: #4a5f72; padding-bottom: 12px; }
  .no-bus { text-align: center; padding: 40px 0; color: #7a8fa6; font-size: 14px; line-height: 1.8;
    background: #1a2634; border-radius: 20px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="clock" id="clock"></div>
  <div class="tabs">
    <button class="tab active" onclick="setTab('home')">집→명륜역</button>
    <button class="tab inactive" onclick="setTab('subway')">집→남양산역</button>
  </div>
  <div id="main-area"></div>
  <div class="next-list" id="next-list"></div>
  <div class="footer" id="footer"></div>
</div>

<script>
// ── 집→지하철: 1300/1500번 ──
const scheduleHome = [
  ...["05:25","06:06","06:48","07:30","08:12","08:54",
      "09:36","10:18","11:00","11:42","12:24","13:06",
      "13:48","14:30","15:12","15:54","16:36","17:18",
      "18:00","18:42","19:24","20:05","20:45","21:25","22:05"]
    .map(t => ({ dep: t, delay: 18, route: "1300번", stop: "경민아파트/브라운스톤", dest: "→명륜역" })),
  ...["05:45","06:27","07:09","07:51","08:33","09:15",
      "09:57","10:39","11:21","12:03","12:45","13:27",
      "14:09","14:51","15:33","16:15","16:57","17:39",
      "18:21","19:03","19:45","20:25","21:05","21:45","22:25"]
    .map(t => ({ dep: t, delay: 26, route: "1500번", stop: "경민아파트", dest: "→명륜역" })),
];

// ── 집→남양산역: 8번 (양우내안애6차발[토] + 23분 = 남양산역 도착) ──
const scheduleSubway = [
  ...["06:00","06:16","06:32","06:48","07:04","07:20","07:36","07:52",
      "08:08","08:24","08:40","08:56","09:12","09:28","09:44","10:00",
      "10:16","10:32","10:48","11:04","11:20","11:36","11:52","12:08",
      "12:24","12:40","13:00","13:16","13:32","13:48","14:04","14:20",
      "14:36","14:52","15:08","15:20","15:36","15:52","16:08","16:24",
      "16:40","16:56","17:12","17:28","17:44","18:00","18:16","18:32",
      "18:48","19:04","19:20","19:36","19:52","20:08","20:24","20:40"]
    .map(t => ({ dep: t, delay: 23, route: "8번", stop: "범어중학교(4416)", dest: "→남양산역" })),
];

const COLOR = { "1300번": "#e84040", "1500번": "#3b82f6", "8번": "#22c55e" };

function toMin(t) {
  const [h, m] = t.split(":").map(Number);
  return h * 60 + m;
}
function toHHMM(min) {
  return `${String(Math.floor(min/60)%24).padStart(2,'0')}:${String(min%60).padStart(2,'0')}`;
}
function makeBuses(schedule) {
  return schedule.map(s => ({
    route: s.route, stop: s.stop, dest: s.dest,
    arrMin: toMin(s.dep) + s.delay,
    arrStr: toHHMM(toMin(s.dep) + s.delay),
  })).sort((a,b) => a.arrMin - b.arrMin);
}

let currentTab = 'home';

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.className = 'tab ' + ((tab === 'home' && i === 0) || (tab === 'subway' && i === 1) ? 'active' : 'inactive');
  });
  render();
}

function render() {
  const now = new Date();
  const nowMin = now.getHours() * 60 + now.getMinutes();
  document.getElementById('clock').textContent =
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')} 현재`;

  const buses = makeBuses(currentTab === 'home' ? scheduleHome : scheduleSubway);
  const upcoming = buses.filter(b => b.arrMin >= nowMin);

  const mainEl = document.getElementById('main-area');
  const nextEl = document.getElementById('next-list');
  const footerEl = document.getElementById('footer');

  if (upcoming.length === 0) {
    mainEl.innerHTML = `<div class="no-bus">🌙 오늘 운행이 종료됐습니다.</div>`;
    nextEl.innerHTML = '';
    footerEl.textContent = '';
    return;
  }

  const f = upcoming[0];
  const diff = f.arrMin - nowMin;
  const color = COLOR[f.route];
  const isSoon = diff <= 5;

  mainEl.innerHTML = `
    <div class="main-card" style="--accent:${color}">
      <div class="label-row">
        <span class="route-badge">${f.route}</span>
        <span class="stop-name">${f.stop}</span>
      </div>
      <div class="dest-name">${f.dest}</div>
      <div class="arrival-time">${f.arrStr}</div>
      <div class="remain" style="color:${isSoon ? '#f59e0b' : color}">
        ${diff === 0 ? '🚌 지금 도착!' : `${diff}분 후 도착`}
      </div>
    </div>
  `;

  nextEl.innerHTML = '';
  upcoming.slice(1, 3).forEach(b => {
    const d = b.arrMin - nowMin;
    const c = COLOR[b.route];
    const el = document.createElement('div');
    el.className = 'next-item';
    el.innerHTML = `
      <div class="next-dot" style="background:${c}"></div>
      <div class="next-info">
        <div class="next-route" style="color:${c}">${b.route}</div>
        <div class="next-stop">${b.stop} ${b.dest}</div>
      </div>
      <div class="next-time-col">
        <div class="next-arr">${b.arrStr}</div>
        <div class="next-rem">${d}분 후</div>
      </div>
    `;
    nextEl.appendChild(el);
  });

  footerEl.textContent = '토요일 기준 · 실제 도착은 달라질 수 있음';
}

render();
setInterval(render, 30000);
</script>
</body>
</html>
