<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>요금소진표 · 알뜰폰 비교</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<style>
@font-face {
  font-family: 'Pretendard';
  src: url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/woff2/Pretendard-Regular.woff2') format('woff2');
  font-weight: 400;
}
@font-face {
  font-family: 'Pretendard';
  src: url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/woff2/Pretendard-SemiBold.woff2') format('woff2');
  font-weight: 600;
}
@font-face {
  font-family: 'Pretendard';
  src: url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/woff2/Pretendard-Bold.woff2') format('woff2');
  font-weight: 800;
}
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');

:root{
  --bg: #0d1117;
  --panel: #151c25;
  --panel-2: #1b2430;
  --line: #253140;
  --text: #e7edf3;
  --muted: #8a97a6;
  --amber: #f5c344;
  --amber-dim: #7a6220;
  --signal: #4fd8a8;
  --signal-dim: #1f4a3c;
  --danger: #ef6a6a;
}
*{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
html,body{margin:0; padding:0; background:var(--bg); color:var(--text); font-family:'Pretendard', sans-serif;}
body{padding-bottom:40px;}
.mono{font-family:'IBM Plex Mono', monospace;}

/* header */
header{
  position: sticky; top:0; z-index: 20;
  background: linear-gradient(180deg, var(--bg) 70%, rgba(13,17,23,0.85) 100%);
  padding: 18px 16px 10px;
  border-bottom: 1px solid var(--line);
}
.eyebrow{
  font-family:'IBM Plex Mono', monospace;
  font-size:11px; letter-spacing: 0.14em; color: var(--amber);
  text-transform: uppercase; margin-bottom:6px; display:flex; align-items:center; gap:6px;
}
.eyebrow .dot{width:6px;height:6px;border-radius:50%; background:var(--signal); box-shadow:0 0 8px var(--signal);}
h1{font-size:22px; font-weight:800; margin:0 0 4px; letter-spacing:-0.01em;}
.sub{color:var(--muted); font-size:13px; margin:0;}

/* criteria bar - the signature element: a spec strip mimicking a plan label */
.spec-strip{
  margin-top:14px;
  display:grid; grid-template-columns: repeat(3,1fr);
  border:1px solid var(--line); border-radius:10px; overflow:hidden;
  background: var(--panel);
}
.spec-cell{
  padding:10px 8px; text-align:center; border-right:1px solid var(--line);
}
.spec-cell:last-child{border-right:none;}
.spec-cell .k{font-size:10px; color:var(--muted); letter-spacing:0.05em; margin-bottom:3px;}
.spec-cell .v{font-family:'IBM Plex Mono', monospace; font-weight:600; font-size:14px; color:var(--amber);}

/* filters */
.filters{
  display:flex; gap:8px; overflow-x:auto; padding:14px 16px 4px;
  scrollbar-width:none;
}
.filters::-webkit-scrollbar{display:none;}
.chip{
  flex:0 0 auto; padding:7px 13px; border-radius:20px; border:1px solid var(--line);
  background: var(--panel); color: var(--muted); font-size:13px; font-weight:600;
  cursor:pointer; white-space:nowrap; transition: all .15s;
}
.chip.active{ background: var(--amber); color:#1b1506; border-color:var(--amber);}

.sortbar{
  display:flex; justify-content:space-between; align-items:center;
  padding: 10px 16px 4px; font-size:12px; color:var(--muted);
}
.sortbar select{
  background:var(--panel); color:var(--text); border:1px solid var(--line);
  border-radius:8px; padding:6px 10px; font-size:12px; font-family:'Pretendard';
}

/* plan cards */
#list{padding: 10px 16px 0; display:flex; flex-direction:column; gap:12px;}
.card{
  background: var(--panel); border:1px solid var(--line); border-radius:14px;
  padding:16px; position:relative; overflow:hidden;
}
.card.match{ border-color: var(--signal-dim); box-shadow: 0 0 0 1px var(--signal-dim) inset; }
.badge-match{
  position:absolute; top:0; right:0;
  background: var(--signal); color:#08211a; font-size:10px; font-weight:700;
  padding:4px 10px; border-radius: 0 0 0 10px; letter-spacing:0.03em;
  font-family:'IBM Plex Mono', monospace;
}
.card-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:12px;}
.carrier{font-size:11px; color:var(--muted); font-family:'IBM Plex Mono', monospace; margin-bottom:2px;}
.planname{font-size:15px; font-weight:700; line-height:1.35;}
.net-tag{
  font-size:10px; padding:2px 7px; border-radius:5px; font-family:'IBM Plex Mono', monospace;
  border:1px solid var(--line); color:var(--muted); flex:0 0 auto;
}
.net-SKT{color:#ff8a5c; border-color:#5c3a28;}
.net-KT{color:#7ecbff; border-color:#254a5c;}
.net-LGU{color:#c99bff; border-color:#4a3a5c;}

.price-row{display:flex; align-items:baseline; gap:4px; margin-bottom:14px;}
.price{font-family:'IBM Plex Mono', monospace; font-size:26px; font-weight:700; color:var(--amber);}
.price-unit{font-size:12px; color:var(--muted);}

.specs{display:grid; grid-template-columns: repeat(3,1fr); gap:8px; margin-bottom:12px;}
.spec-box{
  background: var(--panel-2); border-radius:9px; padding:9px 6px; text-align:center;
}
.spec-box .k{font-size:9px; color:var(--muted); margin-bottom:4px; letter-spacing:0.02em;}
.spec-box .v{font-family:'IBM Plex Mono', monospace; font-size:13px; font-weight:600;}

/* signal bars for QoS speed */
.qos-row{display:flex; align-items:center; gap:8px; padding-top:10px; border-top:1px dashed var(--line);}
.qos-label{font-size:11px; color:var(--muted); flex:0 0 auto;}
.bars{display:flex; align-items:flex-end; gap:2px; height:16px;}
.bars .bar{width:4px; background: var(--line); border-radius:1px;}
.bars .bar.on{background: var(--signal);}
.bars .bar:nth-child(1){height:5px;}
.bars .bar:nth-child(2){height:8px;}
.bars .bar:nth-child(3){height:11px;}
.bars .bar:nth-child(4){height:14px;}
.bars .bar:nth-child(5){height:17px;}
.qos-val{font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--signal); margin-left:auto;}

.note{font-size:11px; color:var(--muted); margin-top:10px; line-height:1.5;}

footer{padding: 22px 16px 10px; text-align:center; color:var(--muted); font-size:11px; line-height:1.7;}
footer a{color:var(--amber); text-decoration:none;}
</style>
</head>
<body>

<header>
  <div class="eyebrow"><span class="dot"></span>MVNO SPEC SHEET</div>
  <h1>알뜰폰 요금제 비교</h1>
  <p class="sub">데이터 소진 후 QoS 3Mbps 기준 · 실제 통신사 요금제 데이터</p>
  <div class="spec-strip">
    <div class="spec-cell"><div class="k">음성</div><div class="v">300분↑</div></div>
    <div class="spec-cell"><div class="k">문자</div><div class="v">300건↑</div></div>
    <div class="spec-cell"><div class="k">소진 후</div><div class="v">3Mbps</div></div>
  </div>
</header>

<div class="filters" id="netFilters"></div>
<div class="sortbar">
  <span id="countLabel">0개 요금제</span>
  <select id="sortSel">
    <option value="price-asc">가격 낮은순</option>
    <option value="price-desc">가격 높은순</option>
    <option value="data-desc">데이터 많은순</option>
  </select>
</div>

<div id="list"></div>

<footer>
  가격은 부가세 포함 기준, 프로모션 할인 및 정책은 통신사 사정에 따라 변동될 수 있어요.<br>
  가입 전 각 통신사 공식 채널에서 최신 조건을 다시 확인하세요.
</footer>

<script>
const PLANS = [
  { carrier:"U+알뜰모바일", plan:"유심 최강가성비 15GB+/300분", net:"LGU", data:15, voice:300, voiceNote:"자사 1회선 무제한", text:300, qos:3, price:27500 },
  { carrier:"KT M모바일", plan:"데이터 맘껏 15GB+/300분", net:"KT", data:15, voice:300, voiceNote:"자사 1회선 무제한", text:300, qos:3, price:27500 },
  { carrier:"스노우맨", plan:"통화300분/데이터15GB++", net:"KT", data:15, voice:300, voiceNote:null, text:300, qos:3, price:28600 },
  { carrier:"스노우맨", plan:"SKT 스노우맨300분15GB+", net:"SKT", data:15, voice:300, voiceNote:null, text:300, qos:3, price:36300 },
  { carrier:"U+알뜰모바일", plan:"유심 최강가성비 15GB+/100분", net:"LGU", data:15, voice:100, voiceNote:"자사 1회선 무제한", text:100, qos:3, price:25900 },
  { carrier:"KT M모바일", plan:"통화100분/데이터15GB++(밀리의서재)", net:"KT", data:15, voice:100, voiceNote:"자사 1회선 무제한", text:100, qos:3, price:27500 },
  { carrier:"U+알뜰모바일", plan:"데이터·통화 마음껏", net:"LGU", data:11, dailyData:2, voice:9999, text:9999, qos:3, price:33990 },
  { carrier:"KT M모바일", plan:"모두다 맘껏 11GB+", net:"KT", data:11, dailyData:2, voice:9999, text:9999, qos:3, price:33900 },
  { carrier:"스노우맨", plan:"데이터11GB+", net:"SKT", data:11, voice:9999, text:9999, qos:3, price:35200 },
];

const NET_LABEL = { SKT:"SKT망", KT:"KT망", LGU:"LGU+망" };
let activeNet = "ALL";

function fmtVoice(p){
  if(p.voice >= 9999) return "무제한";
  return p.voice + "분" + (p.voiceNote ? " *" : "");
}
function fmtText(p){
  return p.text >= 9999 ? "무제한" : p.text + "건";
}
function fmtData(p){
  let s = p.data + "GB";
  if(p.dailyData) s += "+일" + p.dailyData + "GB";
  return s;
}
function isMatch(p){
  return p.voice >= 300 && p.voice < 9999 && p.text >= 300 && p.text < 9999 && p.qos === 3;
}

function render(){
  const sortMode = document.getElementById('sortSel').value;
  let items = PLANS.filter(p => activeNet === "ALL" || p.net === activeNet);

  items.sort((a,b) => {
    if(sortMode === 'price-asc') return a.price - b.price;
    if(sortMode === 'price-desc') return b.price - a.price;
    if(sortMode === 'data-desc') return b.data - a.data;
  });

  document.getElementById('countLabel').textContent = items.length + "개 요금제";

  const list = document.getElementById('list');
  list.innerHTML = items.map(p => {
    const match = isMatch(p);
    const barsOn = p.qos <= 1 ? 1 : p.qos <=3 ? 3 : 5;
    return `
    <div class="card ${match ? 'match':''}">
      ${match ? '<div class="badge-match">기준 일치</div>' : ''}
      <div class="card-top">
        <div>
          <div class="carrier">${p.carrier}</div>
          <div class="planname">${p.plan}</div>
        </div>
        <div class="net-tag net-${p.net}">${NET_LABEL[p.net]}</div>
      </div>
      <div class="price-row">
        <span class="price">${p.price.toLocaleString()}</span>
        <span class="price-unit">원/월</span>
      </div>
      <div class="specs">
        <div class="spec-box"><div class="k">데이터</div><div class="v">${fmtData(p)}</div></div>
        <div class="spec-box"><div class="k">음성</div><div class="v">${fmtVoice(p)}</div></div>
        <div class="spec-box"><div class="k">문자</div><div class="v">${fmtText(p)}</div></div>
      </div>
      <div class="qos-row">
        <span class="qos-label">소진 후 속도</span>
        <div class="bars">
          ${[1,2,3,4,5].map(i => `<div class="bar ${i<=barsOn?'on':''}"></div>`).join('')}
        </div>
        <span class="qos-val">${p.qos}Mbps</span>
      </div>
      ${p.voiceNote ? `<div class="note">* 음성 ${p.voiceNote}, 부가통화 초과분은 별도 과금</div>` : ''}
    </div>`;
  }).join('');
}

function renderFilters(){
  const nets = ["ALL", "SKT", "KT", "LGU"];
  const labels = { ALL:"전체망", SKT:"SKT망", KT:"KT망", LGU:"LGU+망" };
  const wrap = document.getElementById('netFilters');
  wrap.innerHTML = nets.map(n => `<div class="chip ${n===activeNet?'active':''}" data-net="${n}">${labels[n]}</div>`).join('');
  wrap.querySelectorAll('.chip').forEach(el => {
    el.addEventListener('click', () => {
      activeNet = el.dataset.net;
      renderFilters();
      render();
    });
  });
}

document.getElementById('sortSel').addEventListener('change', render);
renderFilters();
render();
</script>
</body>
</html>
