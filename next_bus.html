<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>다음 버스</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0f1923;
    --card: #1a2634;
    --line1300: #e84040;
    --line1500: #3b82f6;
    --text: #f0f4f8;
    --muted: #7a8fa6;
    --soon: #f59e0b;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    user-select: none;
  }

  .wrap {
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* 현재 시각 */
  .clock {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* 메인 카드 */
  .main-card {
    background: var(--card);
    border-radius: 20px;
    padding: 28px 24px;
    border: 1px solid rgba(255,255,255,0.06);
    position: relative;
    overflow: hidden;
  }

  .main-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--accent);
    border-radius: 20px 20px 0 0;
  }

  .label-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .route-badge {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    background: rgba(255,255,255,0.07);
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.03em;
  }

  .stop-name {
    font-size: 12px;
    color: var(--muted);
  }

  .arrival-time {
    font-size: 58px;
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 1;
    color: var(--text);
    margin: 8px 0 4px;
  }

  .remain {
    font-size: 15px;
    font-weight: 600;
    color: var(--soon-color, var(--muted));
  }

  /* 다음 버스 목록 */
  .next-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .next-item {
    background: var(--card);
    border-radius: 14px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1px solid rgba(255,255,255,0.05);
  }

  .next-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .next-info {
    flex: 1;
  }

  .next-route {
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 2px;
  }

  .next-stop {
    font-size: 11px;
    color: var(--muted);
  }

  .next-time-col {
    text-align: right;
  }

  .next-arr {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .next-rem {
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
  }

  /* 하단 */
  .footer {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
  }

  .no-bus {
    text-align: center;
    padding: 40px 0;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.8;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="clock" id="clock"></div>
  <div id="main-area"></div>
  <div class="next-list" id="next-list"></div>
  <div class="footer" id="footer"></div>
</div>

<script>
// ── 시간표 데이터 (토요일 기준, 증산 출발) ──
const schedule = [
  // [증산출발, 정류장도착(분), 노선, 정류장명]
  ...["05:25","06:06","06:48","07:30","08:12","08:54",
      "09:36","10:18","11:00","11:42","12:24","13:06",
      "13:48","14:30","15:12","15:54","16:36","17:18",
      "18:00","18:42","19:24","20:05","20:45","21:25","22:05"]
    .map(t => ({ dep: t, delay: 12, route: "1300번", stop: "경민아파트/브라운스톤" })),
  ...["05:45","06:27","07:09","07:51","08:33","09:15",
      "09:57","10:39","11:21","12:03","12:45","13:27",
      "14:09","14:51","15:33","16:15","16:57","17:39",
      "18:21","19:03","19:45","20:25","21:05","21:45","22:25"]
    .map(t => ({ dep: t, delay: 13, route: "1500번", stop: "경민아파트" })),
];

function toMin(t) {
  const [h, m] = t.split(":").map(Number);
  return h * 60 + m;
}

function toHHMM(totalMin) {
  const h = Math.floor(totalMin / 60) % 24;
  const m = totalMin % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

// 도착 시각 계산 및 정렬
const buses = schedule.map(s => ({
  route: s.route,
  stop: s.stop,
  depMin: toMin(s.dep),
  arrMin: toMin(s.dep) + s.delay,
  arrStr: toHHMM(toMin(s.dep) + s.delay),
})).sort((a, b) => a.arrMin - b.arrMin);

const COLOR = { "1300번": "#e84040", "1500번": "#3b82f6" };

function render() {
  const now = new Date();
  const nowMin = now.getHours() * 60 + now.getMinutes();

  // 현재 시각
  document.getElementById('clock').textContent =
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')} 현재`;

  // 앞으로 올 버스
  const upcoming = buses.filter(b => b.arrMin >= nowMin);

  const mainEl = document.getElementById('main-area');
  const nextEl = document.getElementById('next-list');
  const footerEl = document.getElementById('footer');

  if (upcoming.length === 0) {
    mainEl.innerHTML = `<div class="no-bus">🌙 오늘 운행이 종료됐습니다.<br>내일 05:37부터 운행합니다.</div>`;
    nextEl.innerHTML = '';
    footerEl.textContent = '';
    return;
  }

  // 메인: 다음 버스 1개
  const first = upcoming[0];
  const diffFirst = first.arrMin - nowMin;
  const isSoon = diffFirst <= 5;
  const remainText = diffFirst === 0 ? '지금 도착!' : `${diffFirst}분 후 도착`;
  const color = COLOR[first.route];

  mainEl.innerHTML = `
    <div class="main-card" style="--accent: ${color}">
      <div class="label-row">
        <span class="route-badge">${first.route}</span>
        <span class="stop-name">${first.stop}</span>
      </div>
      <div class="arrival-time">${first.arrStr}</div>
      <div class="remain" style="color: ${isSoon ? '#f59e0b' : color}">${remainText}</div>
    </div>
  `;

  // 다음 2개
  nextEl.innerHTML = '';
  upcoming.slice(1, 3).forEach(b => {
    const diff = b.arrMin - nowMin;
    const c = COLOR[b.route];
    const el = document.createElement('div');
    el.className = 'next-item';
    el.innerHTML = `
      <div class="next-dot" style="background:${c}"></div>
      <div class="next-info">
        <div class="next-route" style="color:${c}">${b.route}</div>
        <div class="next-stop">${b.stop}</div>
      </div>
      <div class="next-time-col">
        <div class="next-arr">${b.arrStr}</div>
        <div class="next-rem">${diff}분 후</div>
      </div>
    `;
    nextEl.appendChild(el);
  });

  footerEl.textContent = '토요일 기준 · 실제 도착은 달라질 수 있음';
}

render();
setInterval(render, 30000); // 30초마다 갱신
</script>
</body>
</html>
